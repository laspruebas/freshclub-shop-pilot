<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fresh Club | Pedido</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <div class="app">
    <header class="header" id="header">
      <div class="brand">Fresh Club</div>
      <div class="subtitle">Revisá tu pedido sugerido</div>
    </header>

    <main class="main">
      <section id="status" class="status"></section>
      <section id="orderList" class="catalog"></section>
      <section id="extras" class="catalog"></section>
    </main>

    <footer class="footer">
      <div class="footer-stack">
        <button id="submitBtn" class="cta">Confirmar pedido</button>
        <button id="editBtn" class="cta-secondary">Editar pedido</button>
      </div>
    </footer>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
