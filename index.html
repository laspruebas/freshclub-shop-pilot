<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fresh Club | Pedido</title>
  <link rel="stylesheet" href="./styles.css" />
</head>
<body class="pedido-page">
  <div class="app">
    <header class="header" id="header">
      <div class="brand">FRUTI</div>

      <h1 class="pedido-title">
        Armamos tu pedido ideal para esta semana
      </h1>

      <p id="subtitle" class="subtitle">
        Podés ajustar cantidades, sacar productos o sumar extras antes de confirmar.
      </p>
    </header>

    <main class="main">
      <section id="status" class="status"></section>
      <section id="orderList" class="catalog"></section>
      
      <section class="extras-block">
        <h2 class="extras-title">Sumá variedad a tu pedido</h2>
        <p class="extras-subtitle">
          Estos productos ayudan a completar mejor la semana de tu hogar.
        </p>
        <div id="extras" class="catalog"></div>
      </section>
    </main>

    <footer class="footer">
      <div class="footer-stack">
        <button id="submitBtn" class="cta">Confirmar mi pedido FRUTI</button>
      </div>
    </footer>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
