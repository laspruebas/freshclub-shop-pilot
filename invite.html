<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRUTI | Invitación</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body class="invite-page">
  <div class="invite-layout">

    <!-- HERO -->
    <section class="invite-hero">
      <div class="invite-tag">
        INVITACIÓN FRUTI
      </div>

      <h1 class="invite-title">
        Te invitaron a comer mejor.
      </h1>

      <p class="invite-subtitle">
        Frutas y verduras frescas cada semana,
        pensadas para tu familia. Un pedido y te
        olvidás.
      </p>
    </section>

    <!-- BODY -->
    <section class="invite-body">

      <div class="invite-impact">
        <div class="impact-line impact-line-1">
          Tu familia come mejor.
        </div>

        <div class="impact-line impact-line-2">
          Vos ganás tiempo.
        </div>

        <div class="impact-line impact-line-3">
          Así de simple.
        </div>
      </div>

      <div class="invite-divider"></div>

      <button id="startInviteBtn" class="invite-btn">
        Empezar por WhatsApp
      </button>

      <p class="invite-footnote">
        Te lleva menos de un minuto
      </p>

    </section>

  </div>

  <script type="module" src="./invite.js"></script>
</body>
</html>
