<!doctype html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FRUTI | Invitación</title>
  <link rel="stylesheet" href="./styles.css" />
</head>

<body class="invite-page">
  <div class="app">
    <header class="invite-header">
      <div class="brand">FRUTI</div>

      <h1 class="invite-title">
        Te invitaron a comer mejor
      </h1>

      <p class="invite-subtitle">
        FRUTI te ayuda a armar un pedido de frutas y verduras pensado para tu hogar.
      </p>
    </header>

    <main class="invite-main">
      <section id="inviteContent" class="invite-card">
        <div class="invite-eyebrow">Invitación recibida</div>

        <h2>Armá tu primer pedido FRUTI</h2>

        <p>
          Completá los datos de tu hogar y te sugerimos un pedido semanal simple, variado y editable.
        </p>

        <button id="startInviteBtn" class="invite-btn">
          Empezar
        </button>

        <p id="inviteRefLabel" class="invite-ref"></p>
      </section>
    </main>
  </div>

  <script type="module" src="./invite.js"></script>
</body>
</html>
