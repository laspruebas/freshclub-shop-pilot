<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>FRUTI</title>

  <link
    rel="stylesheet"
    href="./transitions.css"
  />
</head>

<body class="transition-page">

  <main class="transition-shell">

    <div class="transition-brand">
      FRUTI
    </div>

    <div class="transition-accent"></div>

    <h1
      id="transitionTitle"
      class="transition-title"
    ></h1>

    <p
      id="transitionSubtitle"
      class="transition-subtitle"
    ></p>

    <div class="transition-loader">
      <span></span>
      <span class="active"></span>
      <span></span>
    </div>

    <div
      id="transitionFooter"
      class="transition-footer"
    ></div>

  </main>

  <script src="./transitions.js"></script>

</body>
</html>
